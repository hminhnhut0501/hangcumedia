services:
  - type: web
    name: tele-send-worker
    runtime: node
    rootDir: .
    buildCommand: npx pnpm@10.0.0 install --frozen-lockfile && npx pnpm@10.0.0 --filter worker build
    startCommand: npx pnpm@10.0.0 --filter worker start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_WORKER_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_API_SECRET
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: SCHEDULER_TICK_SECONDS
        value: 30
